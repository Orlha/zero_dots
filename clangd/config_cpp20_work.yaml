CompileFlags:
  Add: [-std=c++20, -Wall, -Wextra, -Wpedantic, -Wshadow, -Wconversion, -Wsign-conversion, -Wnull-dereference, -Wcast-align, -Wunused, -Wformat=2]
Diagnostics:
  UnusedIncludes: Strict
  MissingIncludes: Strict
  Includes:
    AnalyzeAngledIncludes: true
  ClangTidy:
    Add: [bugprone-*, performance-*, readability-*, modernize-*, cppcoreguidelines-*]
    Remove: [modernize-use-trailing-return-type]
    CheckOptions:
      readability-identifier-naming.VariableCase: lower_case
      readability-identifier-naming.FunctionCase: lower_case
      readability-identifier-naming.ClassCase: CamelCase
      readability-function-cognitive-complexity.Threshold: '50'
